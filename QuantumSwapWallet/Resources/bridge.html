<!DOCTYPE html>

<head><meta charset="utf-8"><title>Bridge</title></head>
<body>
<script>
// Diagnostic console output is gated behind AndroidBridge.isDebug()
// so release builds never stringify exception state (which could contain
// sensitive argument values) into logcat via onConsoleMessage.
// the diagnostic output below is further restricted to
// log only opaque category tokens plus the requestId. The raw
// exception message and any payload-derived field is NEVER
// emitted, even in DEBUG, because:
// * `JsBridgeError` messages from a failing decrypt include
// ciphertext bytes;
// * `JSON.parse` failures echo the bad input, which for the
// `walletJson` / `password` paths is the user's secret;
// * `window.onerror` `message` arguments include the offending
// line of code from the SDK, which can include any string the
// caller passed in.
// The opaque category token (e.g. `"AEAD_FAIL"`, `"PARSE_FAIL"`)
// is enough for a developer to locate the failing code path; the
// message itself is intentionally suppressed to keep the bridge
// from being a side-channel that exfiltrates whatever the failing
// payload was. The Swift side already sees the full error via the
// `success: false, error: message` JSON it gets back from
// `AndroidBridge.onResult`, which is the right channel for the
// detail to reach the developer (and which is itself routed
// through `Logger.debug` on the Swift side, where it is redacted).
function _isDebug() {
 try {
 return typeof AndroidBridge !== 'undefined'
 && typeof AndroidBridge.isDebug === 'function'
 && AndroidBridge.isDebug() === true;
 } catch (_) {
 return false;
 }
}
function _categorize(message) {
 var s = String(message || '').toLowerCase();
 if (s.indexOf('aead') >= 0 || s.indexOf('cipher') >= 0
 || s.indexOf('decrypt') >= 0 || s.indexOf('mac') >= 0) {
 return 'AEAD_FAIL';
 }
 if (s.indexOf('parse') >= 0 || s.indexOf('json') >= 0
 || s.indexOf('syntax') >= 0) {
 return 'PARSE_FAIL';
 }
 if (s.indexOf('initialize') >= 0 || s.indexOf('sdk') >= 0
 || s.indexOf('bundle') >= 0) {
 return 'SDK_FAIL';
 }
 if (s.indexOf('payload') >= 0 || s.indexOf('missing') >= 0) {
 return 'PAYLOAD_FAIL';
 }
 if (s.indexOf('network') >= 0 || s.indexOf('rpc') >= 0
 || s.indexOf('fetch') >= 0) {
 return 'NETWORK_FAIL';
 }
 return 'OTHER_FAIL';
}
window.onerror = function(message, source, lineno, colno, error) {
 if (_isDebug()) {
 console.error('UNCAUGHT_JS [' + _categorize(message) + '] at line ' + lineno);
 }
 return true;
};
</script>
<script src="quantumswap-bundle.js" onerror="if (_isDebug()) console.error('SDK_FAIL: bundle load failed')"></script>
<script>
if (_isDebug()) {
 console.log('Bridge: bundle defined = ' + (typeof QuantumSwapSDK !== 'undefined'));
 if (typeof QuantumSwapSDK === 'undefined') {
 console.error('SDK_FAIL: QuantumSwapSDK undefined post-load');
 }
}

var _sdkInitialized = false;
// Track the (chainId, rpcEndpoint) the SDK was last Initialized
// with so the signing handlers can SKIP a redundant
// `QuantumSwapSDK.Initialize(...)` when the config is unchanged.
// Re-Initializing per send re-pays the Go-WASM module
// compile + runtime bring-up cost on every transaction; guarding
// it removes that cost from the timed signing path while still
// re-initializing whenever the user switches network. `null`
// means "last init was offline / unconfigured" so the next
// configured call always re-initializes.
var _sdkInitChainId = null;
var _sdkInitRpc = null;

// DEBUG-only per-phase timing for the send path. Emits an opaque
// label plus millisecond deltas only (never any payload-derived
// string) through the AndroidBridge.debugLog channel so the
// durations reach the native log even when the overall bridge
// call later times out - each phase logs the moment it completes,
// so a 120s timeout still shows which phase was the long pole and
// how far execution got. Gated by _isDebug() so release builds
// emit nothing.
function _now() {
 return (typeof performance !== 'undefined' && performance.now)
 ? performance.now() : Date.now();
}
function _timeLog(tag) {
 if (!_isDebug()) return;
 try {
 if (typeof AndroidBridge !== 'undefined'
 && typeof AndroidBridge.debugLog === 'function') {
 AndroidBridge.debugLog('TIMING ' + tag);
 }
 console.log('TIMING ' + tag);
 } catch (_) {}
}

// Always-on (NOT debug-gated) progress beacon for the long send
// path. Reports the step a handler is ABOUT to enter to the native
// side, which stores it per requestId. Unlike `_timeLog` (which
// logs each step's duration only AFTER it completes, and only in
// DEBUG), this fires BEFORE each step, so on a hard hang the outer
// Swift settle-timeout can read the last reported step and name it
// in the user-facing alert - pinpointing whether the stall was the
// SDK/WASM bring-up, the nonce fetch, or the local signing, even in
// Release and without pulling device logs. Carries only an opaque
// step label; never any payload-derived data.
function _stage(requestId, name) {
 try {
 if (typeof AndroidBridge !== 'undefined'
 && typeof AndroidBridge.stage === 'function') {
 AndroidBridge.stage(requestId, name);
 }
 } catch (_) {}
}

function bytesToBase64(bytes) {
 var binary = '';
 for (var i = 0; i < bytes.length; i++) {
 binary += String.fromCharCode(bytes[i]);
 }
 return btoa(binary);
}

function base64ToBytes(b64) {
 var binary = atob(b64);
 var bytes = new Uint8Array(binary.length);
 for (var i = 0; i < binary.length; i++) {
 bytes[i] = binary.charCodeAt(i);
 }
 return bytes;
}

function hexToBytes(hex) {
 if (!hex) return new Uint8Array(0);
 var clean = hex.startsWith('0x') ? hex.slice(2) : hex;
 if (clean.length % 2 !== 0) throw new Error('invalid hex length');
 var bytes = new Uint8Array(clean.length / 2);
 for (var i = 0; i < bytes.length; i++) {
 bytes[i] = parseInt(clean.substr(i * 2, 2), 16);
 }
 return bytes;
}

// symmetric binary channels between Swift and the JS
// bridge. The QuantumCoin SDK already returns the private and
// public key bytes as Uint8Array (`wallet.signingKey.privateKeyBytes`
// / `publicKeyBytes`), and accepts Uint8Array as input to its
// signing constructors. Previously the bridge stringified those
// bytes via `bytesToBase64(...)` before handing them back to
// Swift, then base64-decoded them again on the way back into JS
// for the signing handler. JS strings are immutable, so every
// such intermediate base64 string lived in V8's string pool until
// GC, which made true zeroization impossible.
// The new channel routes raw bytes via two synchronous XHR helpers
// `stagePendingResultBinary` (JS -> Swift) and `pullPayloadBinary`
// (Swift -> JS). Each call uses a per-(rid, key) capability token
// injected by Swift into `window.__bridgeBinaryTokens[direction][rid][key]`.
// The Uint8Array buffer can be wiped in place via `.fill(0)` after
// it has been handed off, which is the JS-side guarantee we lacked
// before. See `JsEngine.swift` (`PendingBinaryStore`) for the Swift-
// side implementation.
function pullPayloadBinary(rid, key) {
 var tokens = (window.__bridgeBinaryTokens || {}).out || {};
 var ridMap = tokens[rid] || {};
 var token = String(ridMap[key] || '');
 if (!token) throw new Error('binary pull: no token for ' + rid + '/' + key);
 var url = 'appassets:///bridge-binary-pull/'
 + encodeURIComponent(rid) + '/'
 + encodeURIComponent(key) + '/'
 + encodeURIComponent(token);
 var xhr = new XMLHttpRequest();
 xhr.open('GET', url, false);
 xhr.responseType = 'arraybuffer';
 xhr.send(null);
 if (xhr.status !== 200) throw new Error('binary pull failed: status ' + xhr.status);
 // Single-use token; drop after success so a replay surfaces
 // as a missing-token throw on the next call.
 try { delete ridMap[key]; } catch (_) {}
 return new Uint8Array(xhr.response || new ArrayBuffer(0));
}

function stagePendingResultBinary(rid, key, uint8) {
// WKURLSchemeHandler on iOS does NOT reliably
 // receive XHR POST bodies for custom schemes (the body is
 // stripped by WebKit before reaching the scheme handler).
 // We therefore push the binary via the existing
 // `WKScriptMessageHandler` channel. The bytes travel as a
 // JS Array of small integers, which is bridged to a
 // CFArray of NSNumbers and reassembled as `Data` on the
 // Swift side. This is NOT a string round-trip - no V8
 // string-pool entry is created for the bytes - but a JS
 // Array temporarily holds copies of the bytes; we drop
 // the Array reference and zero the source Uint8Array
 // immediately after handoff.
 var tokens = (window.__bridgeBinaryTokens || {})['in'] || {};
 var ridMap = tokens[rid] || {};
 var token = String(ridMap[key] || '');
 if (!token) throw new Error('binary push: no token for ' + rid + '/' + key);
 // Manual array fill (not Array.from) so we don't create
 // any incidental closures over `uint8` that the JIT
 // might keep alive past this call.
 var arr = new Array(uint8.length);
 for (var i = 0; i < uint8.length; i++) {
  arr[i] = uint8[i];
 }
 try {
  window.webkit.messageHandlers.androidBridge.postMessage({
   m: 'pushBinary',
   args: [String(rid), String(key), token, arr]
  });
 } finally {
  // Single-use token; drop it so the next invocation must
  // present a fresh Swift-issued reservation.
  try { delete ridMap[key]; } catch (_) {}
  // Wipe the JS-side source buffer in place after handoff.
  try { uint8.fill(0); } catch (_) {}
  // Drop the temporary Array so its bytes become eligible
  // for GC. (Setting elements to 0 first does NOT mutate
  // V8's underlying allocation but does clear the property
  // values reachable from this scope.)
  for (var j = 0; j < arr.length; j++) { arr[j] = 0; }
  arr = null;
 }
}

// Stage privateKey + publicKey on the inbound (JS -> Swift)
// binary channel and return the metadata-only envelope that
// `sendResult` will JSON-stringify. Used by the wallet-creation
// handlers (`createRandom`, `walletFromSeed`, `walletFromPhrase`,
// `walletFromKeys`) so the secret bytes never appear in the
// `sendResult` JSON envelope.
function stageWalletKeysBinary(requestId, wallet) {
 stagePendingResultBinary(requestId, 'privateKey',
   wallet.signingKey.privateKeyBytes);
 stagePendingResultBinary(requestId, 'publicKey',
   wallet.signingKey.publicKeyBytes);
}

function extractWalletInfo(wallet) {
 // Address only. Secret bytes are staged via
 // `stageWalletKeysBinary` by the caller BEFORE this function
 // is invoked.
 return { address: wallet.address };
}

function sendResult(requestId, data) {
 AndroidBridge.onResult(requestId, JSON.stringify({ success: true, data: data }));
}

function sendError(requestId, error) {
 var message = (error && error.message) ? error.message : String(error);
 if (_isDebug()) {
 // Log only the requestId and an opaque
 // category. The raw `message` may contain ciphertext, the
 // failing payload, or part of the user's typed input; we
 // forward it to the Swift side via `onResult` (where it
 // is routed through `Logger.debug` and redacted), but it
 // never reaches Console.app from this bridge.
 console.error('BRIDGE_ERR [' + _categorize(message) + '] req=' + requestId);
 }
 AndroidBridge.onResult(requestId, JSON.stringify({ success: false, error: message }));
}

// Wrap a phase-specific failure so the Swift side can tell the
// user WHICH step failed: fetching the account nonce ('NONCE'),
// signing the transaction locally ('SIGN'), or broadcasting it
// ('SEND'). The phase travels as a `PHASE_<NAME>:` prefix on the
// error message because the bridge error channel (`sendError` ->
// onResult envelope) carries only a single string. The Swift
// caller strips the prefix and maps it to a localized,
// user-facing alert. See `JsBridge`/`SendViewController`.
function _phaseError(phase, e) {
 var m = (e && e.message) ? e.message : String(e);
 return new Error('PHASE_' + phase + ':' + m);
}

function requireSDK(requestId) {
 if (typeof QuantumSwapSDK === 'undefined') {
 sendError(requestId, 'QuantumSwapSDK bundle failed to load. Check logcat for JS errors.');
 return false;
 }
 return true;
}

function requireSeedWordsSDK(requestId) {
 if (typeof SeedWordsSDK === 'undefined') {
 sendError(requestId, 'SeedWordsSDK bundle failed to load. Check logcat for JS errors.');
 return false;
 }
 return true;
}

async function ensureInitialized(requestId) {
 if (!requireSDK(requestId)) return false;
 if (!_sdkInitialized) {
 var result = await QuantumSwapSDK.Initialize(null);
 _sdkInitialized = true;
 // Offline/unconfigured init: leave the config trackers null
 // so a later configured signing call re-initializes.
 _sdkInitChainId = null;
 _sdkInitRpc = null;
 if (_isDebug()) {
 // Opaque status only; the SDK Initialize result
 // includes config-derived strings (RPC endpoint URL,
 // chain id) we do not need on Console.
 console.log('SDK_OK auto-init');
 }
 }
 return true;
}

// Initialize the SDK for (chainId, rpcEndpoint) only when the
// current config differs from the last one. Avoids re-paying the
// Go-WASM bring-up cost on every send. Returns nothing; throws on
// SDK failure (caller is inside a try/catch).
async function ensureConfigured(chainId, rpcEndpoint) {
 if (!_sdkInitialized
 || _sdkInitChainId !== chainId
 || _sdkInitRpc !== rpcEndpoint) {
 await QuantumSwapSDK.Initialize(
 new QuantumSwapSDK.Config(chainId, rpcEndpoint));
 _sdkInitialized = true;
 _sdkInitChainId = chainId;
 _sdkInitRpc = rpcEndpoint;
 }
}

// Launch-time warm-up (fired fire-and-forget by the native side as
// soon as the bridge becomes ready). Pays the one-time Go-WASM
// compile + runtime + PQC-keygen cost OFF the critical path, so the
// user's first transaction does not absorb module bring-up on top
// of signing. Network-free (offline Initialize) and the throwaway
// wallet is never persisted or returned. Best-effort: any failure
// is swallowed so a warm-up problem never blocks the bridge.
async function _warmup() {
 try {
 if (typeof QuantumSwapSDK === 'undefined') return;
 var _w0 = _now();
 await QuantumSwapSDK.Initialize(null);
 _sdkInitialized = true;
 _sdkInitChainId = null;
 _sdkInitRpc = null;
 // Exercise the circl PQC WASM once so the module is
 // compiled/instantiated and the Go runtime is started before
 // the first real send. Keygen is the cheapest call that still
 // forces full WASM bring-up.
 try { QuantumSwapSDK.Wallet.createRandom(); } catch (_) {}
 _timeLog('warmup=' + Math.round(_now() - _w0) + 'ms');
 } catch (_) {}
}

// Sensitive payloads (passwords, private keys, seed words) are never
// interpolated into the evaluateJavascript string. They are staged by
// the native side in a thread-safe map and pulled here. The
// getPendingPayload call consumes the entry, so replays are rejected
// (empty payload -> handler fails loud).
function pullPayload(requestId) {
 var raw = null;
 try {
 if (typeof AndroidBridge !== 'undefined' &&
 typeof AndroidBridge.getPendingPayload === 'function') {
 raw = AndroidBridge.getPendingPayload(requestId);
 }
 } catch (e) {
 sendError(requestId, 'pullPayload threw: ' + (e && e.message ? e.message : e));
 return null;
 }
 if (!raw) {
 sendError(requestId, 'missing or already-consumed payload for requestId');
 return null;
 }
 try {
 return JSON.parse(raw);
 } catch (pe) {
 sendError(requestId, 'payload JSON parse failed');
 return null;
 }
}

// The name "zeroString" is historical and slightly misleading. JS
// strings are IMMUTABLE; the bytes that already live in the V8
// string pool from the previous `pullPayload` parse cannot be
// overwritten in place. What this helper actually does is:
// 1. Reassign the property to the empty string '', so the
// owning object no longer holds a strong reference to the
// sensitive value, and
// 2. Drop the JSON.parse'd string from the property graph as
// soon as the surrounding `try { ... } finally { ... }`
// returns, so V8's garbage collector can reclaim the string
// on its next sweep.
// The previous bytes remain in memory until GC actually runs.
// That window is bounded but non-zero. A heap snapshot taken
// between the `finally` and the next major GC cycle can still
// contain the password, private key, etc.
// The truthful summary for a reviewer: "best-effort, GC-bounded
// reachability drop, NOT in-place wipe". The stronger guarantee
// would require either (a) marshalling secrets as Uint8Array
// from native code so we can call `.fill(0)` on them (which we
// already do for `privBytes` / `passwordBytes` in the same
// `finally` blocks below), or (b) running scrypt entirely
// outside the JS engine. Both are tracked as future work; this
// file is the JS-side acknowledgement of the residual exposure.
function zeroString(ref, key) {
 if (ref && typeof ref[key] === 'string') {
 try { ref[key] = ''; } catch (_) { /* ignore */ }
 }
}

var bridge = {
 initialize: async function(requestId, chainId, rpcEndpoint) {
 try {
 if (!requireSDK(requestId)) return;
 await QuantumSwapSDK.Initialize(new QuantumSwapSDK.Config(chainId, rpcEndpoint));
 _sdkInitialized = true;
 _sdkInitChainId = chainId;
 _sdkInitRpc = rpcEndpoint;
 sendResult(requestId, {});
 } catch (e) {
 sendError(requestId, e);
 }
 },

 initializeOffline: async function(requestId) {
 try {
 if (!requireSDK(requestId)) return;
 var result = await QuantumSwapSDK.Initialize(null);
 _sdkInitialized = true;
 if (_isDebug()) {
 // Opaque status only.
 console.log('SDK_OK init-offline req=' + requestId);
 }
 sendResult(requestId, {});
 } catch (e) {
 sendError(requestId, e);
 }
 },

 createRandomSeed: async function(requestId, keyType) {
 try {
 if (!(await ensureInitialized(requestId))) return;
 var words = await QuantumSwapSDK.Wallet.createRandomSeed(keyType);
 sendResult(requestId, words);
 } catch (e) {
 sendError(requestId, e);
 }
 },

 createRandom: async function(requestId, keyType) {
 try {
 if (!(await ensureInitialized(requestId))) return;
 var kt = (keyType === 0 || keyType == null) ? undefined : keyType;
 var wallet = QuantumSwapSDK.Wallet.createRandom(undefined, kt);
 var seedHex = wallet.seed;
 if (!seedHex) {
 sendError(requestId, 'createRandom returned wallet without seed');
 return;
 }
 if (!requireSeedWordsSDK(requestId)) return;
 var seedBytes = hexToBytes(seedHex);
 var words = SeedWordsSDK.getWordListFromSeedArray(seedBytes);
 if (!Array.isArray(words)) {
 sendError(requestId, 'getWordListFromSeedArray returned non-array');
 return;
 }
 // Stage privateKey/publicKey on the binary channel
 // BEFORE sendResult so Swift sees them when it consumes the
 // envelope. The JSON envelope carries only address + seed
 // metadata; the secret bytes never enter the JSON string pool.
 stageWalletKeysBinary(requestId, wallet);
 sendResult(requestId, {
 address: wallet.address,
 seed: seedHex,
 seedWords: words
 });
 } catch (e) {
 sendError(requestId, e);
 }
 },

 walletFromSeed: async function(requestId) {
 var payload = null;
 try {
 if (!(await ensureInitialized(requestId))) return;
 payload = pullPayload(requestId);
 if (!payload) return;
 var wallet = await QuantumSwapSDK.Wallet.fromSeed(payload.seedArray);
 // Secrets via binary channel; envelope carries address only.
 stageWalletKeysBinary(requestId, wallet);
 sendResult(requestId, extractWalletInfo(wallet));
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (payload) {
 try { payload.seedArray = null; } catch (_) {}
 }
 }
 },

 walletFromPhrase: async function(requestId) {
 var payload = null;
 try {
 if (!(await ensureInitialized(requestId))) return;
 payload = pullPayload(requestId);
 if (!payload) return;
 var wallet = await QuantumSwapSDK.Wallet.fromPhrase(payload.words);
 // Secrets via binary channel.
 stageWalletKeysBinary(requestId, wallet);
 sendResult(requestId, extractWalletInfo(wallet));
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (payload) {
 try { payload.words = null; } catch (_) {}
 }
 }
 },

 walletFromKeys: async function(requestId) {
 var privBytes = null;
 var pubBytes = null;
 try {
 if (!(await ensureInitialized(requestId))) return;
 // Pull private/public key bytes from the binary channel
 // rather than base64-decoding from a JSON payload.
 // The bytes never appear in any JS string pool.
 privBytes = (typeof pullPayloadBinary === 'function' ? pullPayloadBinary(requestId, 'privKey') : null);
 pubBytes = (typeof pullPayloadBinary === 'function' ? pullPayloadBinary(requestId, 'pubKey') : null);
 if ((!privBytes || !pubBytes) && payload && payload.privKey && payload.pubKey && typeof base64ToBytes === 'function') {
 privBytes = base64ToBytes(String(payload.privKey));
 pubBytes = base64ToBytes(String(payload.pubKey));
 }
 var wallet = await QuantumSwapSDK.Wallet.fromKeys(privBytes, pubBytes);
 stageWalletKeysBinary(requestId, wallet);
 sendResult(requestId, extractWalletInfo(wallet));
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (privBytes) { try { privBytes.fill(0); } catch (_) {} }
 if (pubBytes) { try { pubBytes.fill(0); } catch (_) {} }
 }
 },

// native-coin send.
 // We use the SDK's high-level `wallet.sendTransaction(...)`
 // surface (the same call shape the Android wallet uses, see
 // `quantum-coin-wallet-android/app/src/main/assets/bridge.html`
 // `sendTransaction`). Internally the SDK:
 //   1. Calls `wallet.populateTransaction(tx)` to fill in the
 //      nonce / chainId / from-address fields the user did not
 //      supply.
 //   2. Calls `wallet.signTransaction(populated)` which derives
 //      the canonical transaction hash LOCALLY from the signed
 //      bytes (this is the keccak256 of the signed RLP payload,
 //      independent of any RPC).
 //   3. Calls `provider.sendTransaction(rawBytes)` to broadcast.
 //   4. Returns a `TransactionResponse` whose `.hash` field is
 //      the locally-derived hash from step 2.
 // We surface that `tx.hash` to Swift as `txHash`. Because the
 // hash is derived from the bytes WE signed (not from anything
 // the RPC tells us), the user can independently verify the
 // transaction on a block explorer using the returned hash; if
 // a hostile RPC mines different bytes the user's hash will
 // simply not appear on chain (rather than appearing with the
 // wrong fields). See `Networking/TlsPinning.swift` for why we
 // do not pin RPC TLS by design (decentralization), and the
 // user-visible block-explorer link in
 // `TransactionSentDialogViewController` for the recommended
 // verification path.
 // Why this shape (vs. low-level `signRawTransaction`)
 //   The previous implementation tried to call
 //   `QuantumSwapSDK.signRawTransaction(...)` directly to
 //   re-derive the hash before broadcast. That symbol is not
 //   exposed on the top-level `QuantumSwapSDK` namespace at
 //   runtime (only `signSendCoinTransaction` and the
 //   `wallet.signTransaction` instance method are public), so
 //   the whole send path failed with
 //   `signRawTransaction is not exposed by QuantumSwapSDK bundle`.
 //   The high-level surface used here is the one the SDK
 //   actually contracts to expose; it is the same surface the
 //   Android wallet has shipped for over a year. Using the
 //   public surface also means SDK upgrades that change the
 //   internal signing primitive do not break the wallet.
 sendTransaction: async function(requestId) {
 var payload = null;
 var privBytes = null;
 var pubBytes = null;
 try {
 var _t0 = _now();
 if (!requireSDK(requestId)) return;
 payload = pullPayload(requestId);
 if (!payload) return;
 await ensureConfigured(payload.chainId, payload.rpcEndpoint);
 _timeLog('send.init=' + Math.round(_now() - _t0) + 'ms req=' + requestId);
 var _t1 = _now();
 var provider = new QuantumSwapSDK.JsonRpcProvider(
 payload.rpcEndpoint, payload.chainId);
 privBytes = (typeof pullPayloadBinary === 'function' ? pullPayloadBinary(requestId, 'privKey') : null);
 pubBytes = (typeof pullPayloadBinary === 'function' ? pullPayloadBinary(requestId, 'pubKey') : null);
 if ((!privBytes || !pubBytes) && payload && payload.privKey && payload.pubKey && typeof base64ToBytes === 'function') {
 privBytes = base64ToBytes(String(payload.privKey));
 pubBytes = base64ToBytes(String(payload.pubKey));
 }
 var wallet = await QuantumSwapSDK.Wallet.fromKeys(privBytes, pubBytes, provider);
 _timeLog('send.fromKeys=' + Math.round(_now() - _t1) + 'ms');
 var _t2 = _now();
 var signingContext = wallet.getSigningContext(payload.advancedSigning === true);
 _timeLog('send.getSigningContext=' + Math.round(_now() - _t2) + 'ms');
 var _t3 = _now();
 var tx = await wallet.sendTransaction({
 to: payload.to,
 value: BigInt(payload.value),
 gasLimit: Number(payload.gasLimit),
 signingContext: signingContext
 });
 _timeLog('send.sendTransaction(populate+sign+broadcast)='
 + Math.round(_now() - _t3) + 'ms total=' + Math.round(_now() - _t0) + 'ms');
 sendResult(requestId, { txHash: tx.hash });
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (privBytes) { try { privBytes.fill(0); } catch (_) {} }
 if (pubBytes) { try { pubBytes.fill(0); } catch (_) {} }
 }
 },

// ERC-20-style token transfer.
 // Same pattern as `sendTransaction` above, but the inner
 // transaction is an ERC-20 `transfer(address,uint256)` call.
 // We use the SDK's `IERC20.connect(contract, wallet)` to
 // build a `Contract` instance and then call `.transfer(to,
 // amount, overrides)` on it. The SDK internally:
 //   1. Calls `token.populateTransaction.transfer(to, amount)`
 //      to encode the `transfer` selector + arguments into the
 //      transaction `data` field.
 //   2. Calls `wallet.populateTransaction(tx)` to fill in
 //      nonce / chainId / from-address.
 //   3. Signs locally and derives `tx.hash` from signed bytes.
 //   4. Broadcasts through the connected provider.
 // This is byte-for-byte the same flow the Android wallet ships
 // (see `quantum-coin-wallet-android/.../bridge.html`
 // `sendTokenTransaction`); both wallets produce identical
 // transaction bytes for identical inputs, which is the
 // contract reviewers and exchanges rely on when comparing
 // hashes across our two clients.
 sendTokenTransaction: async function(requestId) {
 var payload = null;
 var privBytes = null;
 var pubBytes = null;
 try {
 var _t0 = _now();

    function pick(raw, fallback) {
        if (raw == null || typeof raw !== 'string' || raw.trim() === '') return fallback;

    }
    return {
        wq: pick(payload.releaseWq, BUILTIN_SWAP_RELEASE.wq),

    await ensureConfigured(payload.chainId, payload.rpcEndpoint);

}

function dexSanitizeError(err) {
    var msg = (err && err.message) ? err.message : String(err);
    return String(msg).replace(/uniswap/gi, '').trim();
}

function dexMapTokenValue(value, release) {
    return value === 'Q' ? release.wq : value;
}

function dexNormalizeAmount(value) {
    if (value == null) return '0';
    return String(value).replace(/,/g, '').trim() || '0';

    if (typeof value === 'bigint') return value;
    if (typeof value === 'number') return BigInt(Math.trunc(value));

// (desktop liquidity-tx.ts minWeiWithSlippage).
function dexMinWeiWithSlippage(amount, slippagePercent) {
    var bps = BigInt(Math.round(Math.max(0, Math.min(100, Number(slippagePercent) || 0)) * 100));
    if (bps <= 0n) return amount;
    return (amount * (10000n - bps)) / 10000n;

// or skewed clocks do not hit UniswapV2Router: EXPIRED.
async function dexGetDeadline(provider, futureSeconds) {
    var sec = BigInt(Math.max(60, Math.min(86400,
        Number(futureSeconds) > 0 ? Number(futureSeconds) : SWAP_DEADLINE_SECONDS)));
    try {
        if (provider && typeof provider.getBlock === 'function') {
            var block = await provider.getBlock('latest');
            if (block != null && block.timestamp != null) {
                var ts = typeof block.timestamp === 'bigint' ? block.timestamp : BigInt(block.timestamp);
                return ts + sec;
            }

    } catch (_) { /* fall through to wall clock */ }
    return BigInt(Math.floor(Date.now() / 1000)) + sec;
}

    var s = typeof addr === 'string' ? addr : String(addr == null ? '' : addr);
    if (!s || s.indexOf('0x') !== 0) return true;
    return /^0x0+$/.test(s);
}

async function dexPairExists(factory, tokenA, tokenB) {
    var pairAddr = await factory.getPair(tokenA, tokenB);
    return !dexIsZeroPairAddress(pairAddr && pairAddr.toString ? pairAddr.toString() : pairAddr);

// (desktop swap-path-search.ts searchSwapPath).

            var nxt = adj[cur][k];
            if (depth[nxt] !== -1) continue;
            depth[nxt] = depth[cur] + 1;
            prev[nxt] = cur;
            queue.push(nxt);
        }
    }
    if (depth[target] !== -1 && depth[target] <= maxEdges) {
        var idxPath = [];
        for (var c = target; c !== -1; c = prev[c]) idxPath.unshift(c);
        return idxPath.map(function(i2) { return nodes[i2]; });
    }
    return null;
}

// Direct pair when it exists, otherwise shortest BFS route through
// wrapped Q + recognized tokens (desktop swap-routing.ts findSwapPath).
async function dexFindSwapPath(provider, fromAddrRaw, toAddrRaw, release) {
    var getAddress = QuantumSwapSDK.getAddress;
    var fromAddr = getAddress(fromAddrRaw);
    var toAddr = getAddress(toAddrRaw);
    var factory = QuantumSwapSDK.QuantumSwapV2Factory.connect(release.factory, provider);
    var seen = {};
    seen[fromAddr.toLowerCase()] = true;
    seen[toAddr.toLowerCase()] = true;
    var hops = [];
    var candidates = [release.wq].concat(RECOGNIZED_TOKEN_CONTRACT_ADDRESSES);
    for (var i = 0; i < candidates.length; i++) {
        var addr = getAddress(candidates[i]);
        if (seen[addr.toLowerCase()]) continue;
        seen[addr.toLowerCase()] = true;
        hops.push(addr);
    }
    var nodes = [fromAddr].concat(hops).concat([toAddr]);
    return dexSearchSwapPath(nodes, function(a, b) { return dexPairExists(factory, a, b); });
}

async function dexResolveSwapPath(provider, fromTokenValue, toTokenValue, release) {
    var path = await dexFindSwapPath(
        provider,
        dexMapTokenValue(fromTokenValue, release),
        dexMapTokenValue(toTokenValue, release),
        release);
    if (!path) throw new Error(SWAP_NO_ROUTE_ERROR);
    return path;
}

// On-chain symbol() for each path token; null on failure (UI falls back
// to the address). Symbols are untrusted RPC data: native UI sanitizes.
function dexGetPathSymbols(provider, path) {
    return Promise.all(path.map(async function(addr) {
        try {
            var token = QuantumSwapSDK.IERC20.connect(addr, provider);
            if (typeof token.symbol === 'function') {
                var s = await token.symbol();
                if (typeof s === 'string' && s.trim() !== '') return s;
            }
        } catch (_) { /* leave null */ }
        return null;
    }));
}

async function dexGetTokenMeta(provider, address) {
    var token = QuantumSwapSDK.IERC20.connect(address, provider);
    var symbol = null;
    var decimals = 18;
    try {
        var s = await token.symbol();
        if (typeof s === 'string' && s.trim() !== '') symbol = s;
    } catch (_) { /* leave null */ }
    try {
        var d = Number(await token.decimals());
        if (Number.isInteger(d) && d >= 0 && d <= 36) decimals = d;
    } catch (_) { /* default 18 */ }
    return { symbol: symbol, decimals: decimals };
}

// Factory walks are capped like the desktop / web-app pool explorer.
var MAX_FACTORY_PAIRS = 200;

async function dexListFactoryPairAddresses(provider, factoryAddress) {
    var factory = QuantumSwapSDK.QuantumSwapV2Factory.connect(factoryAddress, provider);
    var lenRaw = await factory.allPairsLength();
    var len = Math.min(Number(dexAsBigInt(lenRaw)), MAX_FACTORY_PAIRS);
    var addrs = [];
    for (var i = 0; i < len; i++) {
        addrs.push(String(await factory.allPairs(i)));
    }
    return addrs;
}

async function dexReadPairSnapshot(provider, pairAddress) {
    var pair = QuantumSwapSDK.QuantumSwapV2Pair.connect(pairAddress, provider);
    var results = await Promise.all([
        pair.token0(), pair.token1(), pair.getReserves(), pair.totalSupply()
    ]);
    var token0 = String(results[0]);
    var token1 = String(results[1]);
    var metas = await Promise.all([
        dexGetTokenMeta(provider, token0),
        dexGetTokenMeta(provider, token1)
    ]);
    var reserves = results[2];
    return {
        pairAddress: pairAddress,
        token0: token0,
        token1: token1,
        symbol0: metas[0].symbol,
        symbol1: metas[1].symbol,
        decimals0: metas[0].decimals,
        decimals1: metas[1].decimals,
        reserve0: dexAsBigInt(reserves[0]).toString(),
        reserve1: dexAsBigInt(reserves[1]).toString(),
        totalSupply: dexAsBigInt(results[3]).toString()
    };
}

// Resolve amountInWei/amountOutMinWei for a swap the same way the
// desktop's estimate/submit paths do (lastChanged: 'from' | 'to').
async function dexResolveSwapAmounts(router, path, payload) {
    var parseUnits = QuantumSwapSDK.parseUnits;
    var fromDecimals = typeof payload.fromDecimals === 'number' ? payload.fromDecimals : 18;
    var toDecimals = typeof payload.toDecimals === 'number' ? payload.toDecimals : 18;
    var lastChanged = payload.lastChanged === 'to' ? 'to' : 'from';
    var slippagePercent = Math.max(0, Math.min(100, Number(payload.slippagePercent) || 1));
    var amountInWei;
    var amountOutMinWei;
    if (lastChanged === 'to') {
        var amountOutWei = parseUnits(String(payload.amountOut), toDecimals);
        var amountsIn = await router.getAmountsIn(amountOutWei, path);
        amountInWei = Array.isArray(amountsIn) ? amountsIn[0] : amountsIn;
        amountOutMinWei = (amountOutWei * BigInt(100 - slippagePercent)) / 100n;
    } else {
        amountInWei = parseUnits(String(payload.amountIn), fromDecimals);
        var amountsOut = await router.getAmountsOut(amountInWei, path);
        var expectedOutWei = Array.isArray(amountsOut) ? amountsOut[amountsOut.length - 1] : amountsOut;
        amountOutMinWei = (expectedOutWei * BigInt(100 - slippagePercent)) / 100n;
    }
    return { amountInWei: amountInWei, amountOutMinWei: amountOutMinWei };
}

// addLiquidity / addLiquidityETH arguments (desktop liquidity-tx.ts
// buildAddLiquidityCall). Payload: tokenAValue/tokenBValue ("Q" for
// native), amountA/amountB (human strings), decimalsA/decimalsB,
// slippagePercent, ownerAddress.
async function dexBuildAddLiquidityCall(payload, release, provider) {
    var parseUnits = QuantumSwapSDK.parseUnits;
    var getAddress = QuantumSwapSDK.getAddress;
    var decimalsA = typeof payload.decimalsA === 'number' ? payload.decimalsA : 18;
    var decimalsB = typeof payload.decimalsB === 'number' ? payload.decimalsB : 18;
    var amountAWei = parseUnits(dexNormalizeAmount(payload.amountA), decimalsA);
    var amountBWei = parseUnits(dexNormalizeAmount(payload.amountB), decimalsB);
    var slippagePercent = Number(payload.slippagePercent);
    var amountAMinWei = dexMinWeiWithSlippage(amountAWei, slippagePercent);
    var amountBMinWei = dexMinWeiWithSlippage(amountBWei, slippagePercent);
    var to = getAddress(String(payload.ownerAddress));
    var deadline = payload.deadline != null
        ? dexAsBigInt(payload.deadline)
        : await dexGetDeadline(provider, SWAP_DEADLINE_SECONDS);

    var aIsNative = payload.tokenAValue === 'Q';
    var bIsNative = payload.tokenBValue === 'Q';
    if (aIsNative && bIsNative) throw new Error('Both sides cannot be the native coin');

    if (aIsNative || bIsNative) {
        var tokenValue = aIsNative ? payload.tokenBValue : payload.tokenAValue;
        var tokenAmount = aIsNative ? amountBWei : amountAWei;
        var tokenAmountMin = aIsNative ? amountBMinWei : amountAMinWei;
        var nativeAmount = aIsNative ? amountAWei : amountBWei;
        var nativeAmountMin = aIsNative ? amountAMinWei : amountBMinWei;
        return {
            method: 'addLiquidityETH',
            args: [getAddress(String(tokenValue)), tokenAmount, tokenAmountMin, nativeAmountMin, to, deadline],
            value: nativeAmount
        };
    }

    return {
        method: 'addLiquidity',
        args: [
            getAddress(dexMapTokenValue(String(payload.tokenAValue), release)),
            getAddress(dexMapTokenValue(String(payload.tokenBValue), release)),
            amountAWei, amountBWei, amountAMinWei, amountBMinWei, to, deadline
        ],
        value: 0n
    };
}

// removeLiquidity / removeLiquidityETH arguments (desktop
// liquidity-tx.ts buildRemoveLiquidityCall). Payload: tokenAAddress /
// tokenBAddress (actual pair token addresses; one may be the release
// WQ, paid out as native Q via the ETH variant), liquidityWei,
// amountAMinWei / amountBMinWei, ownerAddress.
async function dexBuildRemoveLiquidityCall(payload, release, provider) {
    var getAddress = QuantumSwapSDK.getAddress;
    var tokenA = getAddress(String(payload.tokenAAddress));
    var tokenB = getAddress(String(payload.tokenBAddress));
    var liquidity = dexAsBigInt(payload.liquidityWei);
    var amountAMin = dexAsBigInt(payload.amountAMinWei);
    var amountBMin = dexAsBigInt(payload.amountBMinWei);
    var to = getAddress(String(payload.ownerAddress));
    var deadline = payload.deadline != null
        ? dexAsBigInt(payload.deadline)
        : await dexGetDeadline(provider, SWAP_DEADLINE_SECONDS);

    var wqLower = release.wq.toLowerCase();
    var aIsWq = tokenA.toLowerCase() === wqLower;
    var bIsWq = tokenB.toLowerCase() === wqLower;

    if (aIsWq || bIsWq) {
        var token = aIsWq ? tokenB : tokenA;
        var tokenMin = aIsWq ? amountBMin : amountAMin;
        var ethMin = aIsWq ? amountAMin : amountBMin;
        return { method: 'removeLiquidityETH', args: [token, liquidity, tokenMin, ethMin, to, deadline], value: 0n };
    }
    return { method: 'removeLiquidity', args: [tokenA, tokenB, liquidity, amountAMin, amountBMin, to, deadline], value: 0n };
}

// Wallet construction for the DEX submit methods. iOS platform
// difference vs Android: the key bytes are pulled over the binary
// channel (never JSON), same as sendTransaction above.
async function dexWalletFromBinaryKeys(requestId, provider, keyRefs, payloadOpt) {
    // Prefer iOS binary channel; fall back to Android JSON base64.
    var priv = null;
    var pub = null;
    try { if (typeof pullPayloadBinary === 'function') priv = pullPayloadBinary(requestId, 'privKey'); } catch (_) {}
    try { if (typeof pullPayloadBinary === 'function') pub = pullPayloadBinary(requestId, 'pubKey'); } catch (_) {}
    var payload = payloadOpt || null;
    if ((!priv || !pub) && payload && payload.privKey && payload.pubKey
            && typeof base64ToBytes === 'function') {
        priv = base64ToBytes(String(payload.privKey));
        pub = base64ToBytes(String(payload.pubKey));
    }
    if (!priv || !pub) {
        throw new Error('DEX signing keys missing');
    }
    keyRefs.priv = priv;
    keyRefs.pub = pub;
    return QuantumSwapSDK.Wallet.fromKeys(keyRefs.priv, keyRefs.pub, provider);
}

function dexSigningOverrides(wallet, payload, base) {
    var out = {};
    for (var k in base) { out[k] = base[k]; }
    out.signingContext = wallet.getSigningContext(payload.advancedSigning === true);
    return out;
}

function dexZeroKeys(keyRefs) {
    if (keyRefs) {
        if (keyRefs.priv) { try { keyRefs.priv.fill(0); } catch (_) {} }
        if (keyRefs.pub) { try { keyRefs.pub.fill(0); } catch (_) {} }
    }
}

            var lpBalance = null;
            if (payload.ownerAddress) {
                var pair = QuantumSwapSDK.QuantumSwapV2Pair.connect(String(pairAddr), provider);
                lpBalance = dexAsBigInt(await pair.balanceOf(getAddress(String(payload.ownerAddress)))).toString();
            }
            sendResult(requestId, {
                exists: true, tokenAAddress: tokenAAddress, tokenBAddress: tokenBAddress,
                pair: snapshot, lpBalance: lpBalance
            });
        } catch (e) {
            sendError(requestId, dexSanitizeError(e));
        }
    },

    // Allowance of an arbitrary token (ERC20 side or LP token) toward
    // the router; requiredAmountWei is a base-units string (desktop
    // LiquidityCheckAllowance).
    liquidityCheckAllowance: async function(requestId) {
        try {
            if (!requireSDK(requestId)) return;
            var payload = pullPayload(requestId);
            if (!payload) return;
            if (!payload.ownerAddress) { sendError(requestId, 'Owner address required'); return; }
            if (!payload.tokenAddress) { sendError(requestId, 'Token address required'); return; }
            var provider = await dexInit(payload);
            var release = dexResolveRelease(payload);
            var getAddress = QuantumSwapSDK.getAddress;
            var requiredWei = dexAsBigInt(payload.requiredAmountWei == null ? 0 : payload.requiredAmountWei);
            var token = QuantumSwapSDK.IERC20.connect(getAddress(String(payload.tokenAddress)), provider);
            var allowanceWei = 0n;
            try {
                allowanceWei = dexAsBigInt(await token.allowance(
                    getAddress(String(payload.ownerAddress)), getAddress(release.router)));
            } catch (_) { allowanceWei = 0n; }
            sendResult(requestId, {
                sufficient: allowanceWei >= requiredWei,
                allowance: allowanceWei.toString()
            });
        } catch (e) {
            sendError(requestId, dexSanitizeError(e));
        }
    },

    // Approve the router for the maximum amount (one-time approval per
    // token / LP token; desktop LiquiditySubmitApprove).
    liquiditySubmitApprove: async function(requestId) {
        var payload = null;
        var keyRefs = { priv: null, pub: null };
        try {
            if (!requireSDK(requestId)) return;
            payload = pullPayload(requestId);
            if (!payload) return;
            if (!payload.tokenAddress) { sendError(requestId, 'Token address required'); return; }
            var provider = await dexInit(payload);
            var release = dexResolveRelease(payload);
            var getAddress = QuantumSwapSDK.getAddress;
            var wallet = await dexWalletFromBinaryKeys(requestId, provider, keyRefs, payload);
            var gasLimit = Number(payload.gasLimit) || 84000;
            var token = QuantumSwapSDK.IERC20.connect(getAddress(String(payload.tokenAddress)), wallet);
            var tx = await token.approve(getAddress(release.router), QuantumSwapSDK.MaxUint256,
                dexSigningOverrides(wallet, payload, { gasLimit: gasLimit }));
            sendResult(requestId, { txHash: tx.hash });
        } catch (e) {
            sendError(requestId, dexSanitizeError(e));
        } finally {
            dexZeroKeys(keyRefs);
        }
    },

    // Submit addLiquidity / addLiquidityETH (desktop LiquiditySubmitAdd).
    liquiditySubmitAdd: async function(requestId) {
        var payload = null;
        var keyRefs = { priv: null, pub: null };
        try {
            if (!requireSDK(requestId)) return;
            payload = pullPayload(requestId);
            if (!payload) return;
            if (!payload.ownerAddress) { sendError(requestId, 'Owner address required'); return; }
            var provider = await dexInit(payload);
            var release = dexResolveRelease(payload);
            var wallet = await dexWalletFromBinaryKeys(requestId, provider, keyRefs, payload);
            var call = await dexBuildAddLiquidityCall(payload, release, provider);
            var gasLimit = Number(payload.gasLimit) || 300000;
            var router = QuantumSwapSDK.QuantumSwapV2Router02.connect(release.router, wallet);
            var overrides = dexSigningOverrides(wallet, payload,
                call.value > 0n ? { gasLimit: gasLimit, value: call.value } : { gasLimit: gasLimit });
            var tx = await router[call.method].apply(router, call.args.concat([overrides]));
            sendResult(requestId, { txHash: tx.hash });
        } catch (e) {
            sendError(requestId, dexSanitizeError(e));
        } finally {
            dexZeroKeys(keyRefs);
        }
    },

    // Submit removeLiquidity / removeLiquidityETH (desktop
    // LiquiditySubmitRemove).
    liquiditySubmitRemove: async function(requestId) {
        var payload = null;
        var keyRefs = { priv: null, pub: null };
        try {
            if (!requireSDK(requestId)) return;
            payload = pullPayload(requestId);
            if (!payload) return;
            if (!payload.ownerAddress) { sendError(requestId, 'Owner address required'); return; }
            var provider = await dexInit(payload);
            var release = dexResolveRelease(payload);
            var wallet = await dexWalletFromBinaryKeys(requestId, provider, keyRefs, payload);
            var call = await dexBuildRemoveLiquidityCall(payload, release, provider);
            var gasLimit = Number(payload.gasLimit) || 300000;
            var router = QuantumSwapSDK.QuantumSwapV2Router02.connect(release.router, wallet);
            var tx = await router[call.method].apply(router,
                call.args.concat([dexSigningOverrides(wallet, payload, { gasLimit: gasLimit })]));
            sendResult(requestId, { txHash: tx.hash });
        } catch (e) {
            sendError(requestId, dexSanitizeError(e));
        } finally {
            dexZeroKeys(keyRefs);
        }
    },

    // Submit factory.createPair (desktop PoolsSubmitCreatePair).
    poolsSubmitCreatePair: async function(requestId) {
        var payload = null;
        var keyRefs = { priv: null, pub: null };
        try {
            if (!requireSDK(requestId)) return;
            payload = pullPayload(requestId);
            if (!payload) return;
            var provider = await dexInit(payload);
            var release = dexResolveRelease(payload);
            var getAddress = QuantumSwapSDK.getAddress;
            var wallet = await dexWalletFromBinaryKeys(requestId, provider, keyRefs, payload);
            var tokenAAddress = getAddress(dexMapTokenValue(String(payload.tokenAValue), release));
            var tokenBAddress = getAddress(dexMapTokenValue(String(payload.tokenBValue), release));
            if (tokenAAddress.toLowerCase() === tokenBAddress.toLowerCase()) {
                sendError(requestId, 'Identical tokens');
                return;
            }
            var gasLimit = Number(payload.gasLimit) || 3000000;
            var factory = QuantumSwapSDK.QuantumSwapV2Factory.connect(release.factory, wallet);
            var tx = await factory.createPair(tokenAAddress, tokenBAddress,
                dexSigningOverrides(wallet, payload, { gasLimit: gasLimit }));
            sendResult(requestId, { txHash: tx.hash });
        } catch (e) {
            sendError(requestId, dexSanitizeError(e));
        } finally {
            dexZeroKeys(keyRefs);
        }
    }
});
